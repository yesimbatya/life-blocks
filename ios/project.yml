name: LifeBlocks
options:
  bundleIdPrefix: com.lifeblocks
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

targets:
  LifeBlocks:
    type: application
    platform: iOS
    sources:
      - path: LifeBlocks
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lifeblocks.app
        CODE_SIGN_ENTITLEMENTS: LifeBlocks/LifeBlocks.entitlements
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
    info:
      path: LifeBlocks/Info.plist
      properties:
        CFBundleDisplayName: Life Blocks
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSHealthShareUsageDescription: "Life Blocks reads your sleep and workout data to automatically track your health habits."
    dependencies:
      - target: LifeBlocksWidgetExtension

  LifeBlocksWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: LifeBlocksWidget
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lifeblocks.app.widget
        CODE_SIGN_ENTITLEMENTS: LifeBlocksWidget/LifeBlocksWidget.entitlements
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
    info:
      path: LifeBlocksWidget/Info.plist
      properties:
        CFBundleDisplayName: Life Blocks Widget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
